apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Each component is applied individually by setup.sh in dependency order.
# This file exists for reference and for `kubectl apply -k . --enable-helm` if desired.
# Note: applying all at once may hit ordering issues (CRDs, namespaces).

resources:
  - argocd
  - tekton
  - gitea
  - vault
  - cloudnative-pg
  - external-secrets
  - monitoring
