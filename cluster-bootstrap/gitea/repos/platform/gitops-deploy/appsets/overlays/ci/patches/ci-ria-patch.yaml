apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ria-set
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: in-cluster
            nameNormalized: ria
            repoURL: http://gitea-http.gitea.svc:3000/platform/gitops-deploy.git
            path: components/ria/overlays/ci
            namespace: ria-ci
            environment: ci
