apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ria-gitea-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: ria-gitea-creds
  data:
    - secretKey: username
      remoteRef:
        key: platform/ria
        property: username
    - secretKey: password
      remoteRef:
        key: platform/ria
        property: password
