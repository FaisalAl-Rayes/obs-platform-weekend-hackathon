apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: gitea-pac-token
spec:
  externalSecretName: gitea-pac-token
  namespaceSelectors:
    - matchLabels:
        obs-platform/pac-enabled: "true"
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: vault
      kind: ClusterSecretStore
    target:
      name: gitea-pac-token
    data:
      - secretKey: token
        remoteRef:
          key: platform/pac
          property: token
